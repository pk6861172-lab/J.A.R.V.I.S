services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
  yjs:
    build: ./yjs_server
    ports:
      - "1234:1234"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
